<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seminex Org – Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-display: 'Lora', serif;   /* CUSTOM FONT ↓ */
      --font-body:    'DM Sans', sans-serif;
      --cream: #fdf8e1; --maroon: #8b2020; --maroon-dark: #6e1a1a;
      --sidebar-bg: #d4601a; --text-dark: #3a2e2e; --text-muted: #7a6a5a;
      --border: #d4c9a0; --card-shadow: rgba(139,32,32,.18);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; min-height: 100vh; font-family: var(--font-body); background: var(--cream); }
    .sidebar { width: 220px; background: var(--sidebar-bg); display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
    .sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 20px 18px 22px; border-bottom: 1px solid rgba(255,255,255,.15); }
    /* LOGO PLACEHOLDER — replace .logo-mini with <img src="assets/logo-mini.png" style="width:36px;height:36px;object-fit:contain;"> */
    .logo-mini { width: 36px; height: 36px; background: rgba(255,255,255,.15); border: 1.5px dashed rgba(255,255,255,.5); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-mini span { font-size: 9px; color: rgba(255,255,255,.6); text-align: center; line-height: 1.2; }
    .brand-label { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: #fff; letter-spacing: .02em; } /* CUSTOM FONT ↓ */
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; color: rgba(255,255,255,.85); font-family: var(--font-body); font-size: 14px; font-weight: 500; text-decoration: none; transition: background .15s; }
    .nav-item:hover { background: rgba(255,255,255,.15); }
    .nav-item.active { background: rgba(255,255,255,.22); color: #fff; font-weight: 600; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar-footer { padding: 12px 12px 24px; }
    .logout-btn { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; color: rgba(255,255,255,.8); font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: none; width: 100%; transition: background .15s; }
    .logout-btn:hover { background: rgba(255,255,255,.15); }
    .logout-btn svg { width: 18px; height: 18px; }
    .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { padding: 22px 36px 18px; border-bottom: 1.5px solid var(--border); background: var(--cream); }
    .page-title { font-family: var(--font-display); font-size: 32px; font-weight: 700; color: var(--maroon); } /* CUSTOM FONT ↓ */
    .content { padding: 28px 36px; display: flex; flex-direction: column; gap: 24px; }
    .card { background: var(--cream); border: 1.5px solid var(--border); border-radius: 14px; padding: 24px; box-shadow: 3px 5px 0px var(--card-shadow); }
    .card-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--maroon); margin-bottom: 6px; } /* CUSTOM FONT ↓ */
    .welcome-card .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 22px; }
    .welcome-actions { display: flex; gap: 12px; }
    .btn-solid { padding: 10px 22px; background: var(--maroon); color: #fff; border: none; border-radius: 8px; font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; text-decoration: none; }
    .btn-solid:hover { background: var(--maroon-dark); }
    .btn-outline { padding: 10px 22px; background: transparent; color: var(--maroon); border: 1.5px solid var(--maroon); border-radius: 8px; font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s, color .15s; text-decoration: none; }
    .btn-outline:hover { background: var(--maroon); color: #fff; }
    .lower-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 16px 8px; gap: 10px; }
    .empty-state svg { width: 52px; height: 52px; color: #c4b898; }
    .empty-state p { font-size: 14px; color: #c4b898; }
    .archived-stat { display: flex; align-items: center; gap: 8px; font-size: 15px; color: var(--maroon); margin: 8px 0 28px; }
    .stat-hash { font-size: 20px; font-weight: 700; }
    .go-btn { display: flex; align-items: center; justify-content: space-between; background: var(--maroon); color: #fdf8e1; border: none; border-radius: 50px; padding: 14px 20px; width: 100%; font-family: var(--font-body); font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 2px 3px 0px rgba(0,0,0,.15); transition: background .15s; text-decoration: none; }
    .go-btn:hover { background: var(--maroon-dark); }
      .brand-logo { display: block; object-fit: contain; background: transparent !important; border: 0 !important; border-radius: 0 !important; }
    .sidebar-brand .brand-logo { width: 36px; height: 36px; flex-shrink: 0; }
    .right-panel .brand-logo { width: 160px; height: 160px; margin-bottom: 24px; }
    .logo-mark-img { width: 50px; height: 50px; flex: 0 0 auto; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img class="logo-mini brand-logo" src="../assets/svg/seminex-logo-white.svg" alt="Seminex logo">
      <span class="brand-label">Seminex</span>
    </div>
    <nav class="sidebar-nav">
      <a href="org-home.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>Home
      </a>
      <a href="org-your-seminar.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Your Seminars
      </a>
      <a href="org-history.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 0 .5-4.5"/><polyline points="3 3 3 8 8 8"/></svg>History
      </a>
      <a href="org-profile.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="window.location.href='org-signin.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar"><h1 class="page-title">Home</h1></div>
    <div class="content">
      <!-- Welcome card -->
      <div class="card welcome-card">
        <div class="card-title">Welcome back, #Username#</div>
        <p class="subtitle">Here's what happened with your seminars:</p>
        <div class="welcome-actions">
          <a href="org-create-seminar.html" class="btn-solid">Create Seminars</a>
          <a href="org-your-seminar.html" class="btn-outline">View Seminars</a>
        </div>
      </div>

      <div class="lower-row">
        <!-- Upcoming Seminars -->
        <div class="card">
          <div class="card-title">Upcoming Seminars</div>
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><ellipse cx="12" cy="12" rx="4" ry="10"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
            <p>No Upcoming Seminars</p>
          </div>
        </div>

        <!-- Archived Seminars -->
        <div class="card">
          <div class="card-title">Archived Seminars</div>
          <div class="archived-stat">
            <span class="stat-hash">#</span>
            <span>Seminars</span>
          </div>
          <a href="org-history.html" class="go-btn">Go to history <span>›</span></a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
