<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seminex Org – Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-display: 'Lora', serif;
      --font-body:    'DM Sans', sans-serif;
      --cream:        #fdf8e1;
      --maroon:       #8b2020;
      --maroon-dark:  #6e1a1a;
      --sidebar-bg:   #d4601a;
      --text-dark:    #3a2e2e;
      --text-muted:   #7a6a5a;
      --border:       #d4c9a0;
      --card-shadow:  rgba(139,32,32,.18);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; min-height: 100vh; font-family: var(--font-body); background: var(--cream); }

    /* ══ SIDEBAR ══ */
    .sidebar { width: 220px; background: var(--sidebar-bg); display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
    .sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 20px 18px 22px; border-bottom: 1px solid rgba(255,255,255,.15); }
    .brand-logo { display: block; object-fit: contain; background: transparent !important; border: 0 !important; border-radius: 0 !important; }
    .sidebar-brand .brand-logo { width: 36px; height: 36px; flex-shrink: 0; }
    .brand-label { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: #fff; letter-spacing: .02em; }
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; color: rgba(255,255,255,.85); font-family: var(--font-body); font-size: 14px; font-weight: 500; text-decoration: none; transition: background .15s; }
    .nav-item:hover { background: rgba(255,255,255,.15); }
    .nav-item.active { background: rgba(255,255,255,.22); color: #fff; font-weight: 600; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar-footer { padding: 12px 12px 24px; }
    .logout-btn { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; color: rgba(255,255,255,.8); font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: none; width: 100%; transition: background .15s; }
    .logout-btn:hover { background: rgba(255,255,255,.15); }
    .logout-btn svg { width: 18px; height: 18px; }

    /* ══ MAIN ══ */
    .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { padding: 22px 36px 18px; border-bottom: 1.5px solid var(--border); background: var(--cream); }
    .page-title { font-family: var(--font-display); font-size: 32px; font-weight: 700; color: var(--maroon); }
    .content { padding: 28px 36px; display: flex; flex-direction: column; gap: 20px; }

    /* ══ PROFILE HEADER CARD ══ */
    .profile-header-card {
      background: var(--cream); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 24px 28px;
      box-shadow: 3px 5px 0px var(--card-shadow);
      display: flex; align-items: center; gap: 28px;
    }
    /* AVATAR PLACEHOLDER — replace with <img src="photo.jpg" style="width:100px;height:100px;border-radius:50%;object-fit:cover;flex-shrink:0;"> */
    .avatar { width: 100px; height: 100px; border-radius: 50%; background: #c8c0b8; flex-shrink: 0; }
    .profile-info { display: flex; flex-direction: column; gap: 6px; }
    .profile-name { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--maroon); }
    .profile-email { font-family: var(--font-body); font-size: 14px; color: var(--text-muted); margin-bottom: 4px; }
    .role-badge { display: inline-block; background: var(--maroon-dark); color: #fdf8e1; font-family: var(--font-body); font-size: 13px; border-radius: 50px; padding: 6px 18px; width: fit-content; }

    /* ══ LOWER ROW ══ */
    .lower-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }

    /* ══ PERSONAL INFO CARD ══ */
    .info-card { background: var(--cream); border: 1.5px solid var(--border); border-radius: 14px; padding: 24px 28px; box-shadow: 3px 5px 0px var(--card-shadow); }
    .card-section-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--maroon); margin-bottom: 20px; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-family: var(--font-body); font-size: 13px; color: var(--maroon); margin-bottom: 5px; }
    .field input, .field select {
      width: 100%; padding: 9px 12px;
      background: var(--cream); border: 1.5px solid var(--border);
      border-radius: 7px; font-family: var(--font-body);
      font-size: 14px; color: var(--text-dark);
      outline: none; appearance: none; -webkit-appearance: none;
      transition: border-color .2s;
    }
    .field input:focus, .field select:focus { border-color: var(--maroon); }

    .select-wrap { position: relative; }
    .select-wrap select { padding-right: 36px; cursor: pointer; }
    .select-wrap::after {
      content: ''; position: absolute; right: 13px; top: 50%;
      width: 8px; height: 8px;
      border-right: 2px solid var(--text-muted);
      border-bottom: 2px solid var(--text-muted);
      transform: translateY(-70%) rotate(45deg);
      pointer-events: none;
    }

    .btn-save { background: var(--maroon-dark); color: #fdf8e1; border: none; border-radius: 8px; padding: 11px 24px; font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; margin-top: 6px; }
    .btn-save:hover { background: #5a1212; }

    /* ══ COMPLETED SEMINARS CARD ══ */
    .completed-card { background: var(--cream); border: 1.5px solid var(--border); border-radius: 14px; padding: 24px 28px; box-shadow: 3px 5px 0px var(--card-shadow); }
    .completed-stat { display: flex; align-items: center; gap: 10px; font-family: var(--font-body); font-size: 15px; color: var(--maroon); margin: 10px 0 32px; }
    .stat-hash { font-size: 22px; font-weight: 700; }
    .go-btn { display: flex; align-items: center; justify-content: space-between; background: var(--maroon); color: #fdf8e1; border: none; border-radius: 50px; padding: 14px 20px; width: 100%; font-family: var(--font-body); font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 2px 3px 0px rgba(0,0,0,.15); transition: background .15s; text-decoration: none; }
    .go-btn:hover { background: var(--maroon-dark); }

    /* ══ MODAL ══ */
    .modal-overlay { position: fixed; inset: 0; background: rgba(50,30,20,.45); backdrop-filter: blur(3px); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .22s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box { background: var(--cream); border-radius: 14px; padding: 32px 36px; box-shadow: 0 8px 32px rgba(0,0,0,.25); transform: scale(.94); transition: transform .22s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; align-items: center; gap: 12px; min-width: 260px; text-align: center; }
    .modal-overlay.open .modal-box { transform: scale(1); }
    .modal-icon { width: 52px; height: 52px; border-radius: 50%; background: var(--maroon); display: flex; align-items: center; justify-content: center; }
    .modal-icon svg { width: 28px; height: 28px; color: #fdf8e1; }
    .modal-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--maroon); }
    .modal-sub { font-family: var(--font-body); font-size: 13px; color: var(--text-muted); }
    .btn-ok { background: var(--maroon); color: #fdf8e1; border: none; border-radius: 8px; padding: 10px 32px; font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; margin-top: 4px; }
    .btn-ok:hover { background: var(--maroon-dark); }

  </style>
  <link rel="stylesheet" href="../shared/css/animations.css">
  <link rel="stylesheet" href="../shared/css/responsive.css">
</head>
<body>

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img class="brand-logo" src="../assets/svg/seminex-logo-white.svg" alt="Seminex logo" style="width:36px;height:36px;flex-shrink:0;">
      <span class="brand-label">Seminex</span>
    </div>
    <nav class="sidebar-nav">
      <a href="org-home.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        Home
      </a>
      <a href="org-your-seminar.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Your Seminars
      </a>
      <a href="org-history.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 0 .5-4.5"/><polyline points="3 3 3 8 8 8"/></svg>
        History
      </a>
      <a href="org-profile.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="window.location.href='org-signin.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main class="main">
    <div class="topbar">
      <h1 class="page-title">Profile</h1>
    </div>

    <div class="content">

      <!-- Profile header -->
      <div class="profile-header-card">
        <!--
          AVATAR PLACEHOLDER
          Replace this div with:
            <img src="profile-photo.jpg" alt="Profile Photo"
                 style="width:100px;height:100px;border-radius:50%;object-fit:cover;flex-shrink:0;">
        -->
        <div class="avatar"></div>
        <div class="profile-info">
          <div class="profile-name">#Organization Name#</div>
          <div class="profile-email">#orgemail@example.com#</div>
          <span class="role-badge">Organization</span>
        </div>
      </div>

      <!-- Lower row -->
      <div class="lower-row">

        <!-- Personal Information form -->
        <div class="info-card">
          <div class="card-section-title">Personal Information</div>

          <div class="field">
            <label>Name:</label>
            <input type="text" />
          </div>

          <div class="field">
            <label>Email:</label>
            <input type="email" />
          </div>

          <div class="field">
            <label>Program:</label>
            <div class="select-wrap">
              <select>
                <option value="" disabled selected></option>
                <option>Bachelor of Science in Computer Science (BSCS)</option>
                <option>Bachelor of Science in Information Technology (BSIT)</option>
                <option>Bachelor of Science in Entertainment and Multimedia Computing (BSEMC)</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label>Year Level:</label>
            <div class="select-wrap">
              <select>
                <option value="" disabled selected></option>
                <option>First Year</option>
                <option>Second Year</option>
                <option>Third Year</option>
                <option>Fourth Year</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label>Block:</label>
            <div class="select-wrap">
              <select>
                <option value="" disabled selected></option>
                <option>Block A</option>
                <option>Block B</option>
                <option>Block C</option>
                <option>Block D</option>
                <option>Block E</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label>Role:</label>
            <input type="text" />
          </div>

          <button class="btn-save" onclick="openModal()">Save Changes</button>
        </div>

        <!-- Completed Seminars -->
        <div class="completed-card">
          <div class="card-section-title">Completed Seminars</div>
          <div class="completed-stat">
            <span class="stat-hash">#</span>
            <span>Seminars across # seminars</span>
          </div>
          <a href="org-history.html" class="go-btn">
            Go to history
            <span>›</span>
          </a>
        </div>

      </div>
    </div>
  </main>

  <!-- ══ CHANGES SAVED MODAL ══ -->
  <div class="modal-overlay" id="saveModal" onclick="handleOverlay(event)">
    <div class="modal-box" id="saveBox">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="modal-title">Changes Saved</div>
      <p class="modal-sub">Your profile has been updated successfully.</p>
      <button class="btn-ok" onclick="closeModal()">OK</button>
    </div>
  </div>

  <script>
    function openModal()  { document.getElementById('saveModal').classList.add('open'); }
    function closeModal() { document.getElementById('saveModal').classList.remove('open'); }
    function handleOverlay(e) { if (!document.getElementById('saveBox').contains(e.target)) closeModal(); }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
