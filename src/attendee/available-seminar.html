<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seminex – Available Seminars</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-display: 'Lora', serif;   /* CUSTOM FONT ↓ */
      --font-body:    'DM Sans', sans-serif;
      --cream: #fdf8e1; --maroon: #8b2020; --maroon-dark: #6e1a1a;
      --sidebar-bg: #d4601a; --text-dark: #3a2e2e; --text-muted: #7a6a5a;
      --border: #d4c9a0; --card-shadow: rgba(139,32,32,.18);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; min-height: 100vh; font-family: var(--font-body); background: var(--cream); }
    .sidebar { width: 220px; background: var(--sidebar-bg); display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
    .sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 20px 18px 22px; border-bottom: 1px solid rgba(255,255,255,.15); }
    /* LOGO PLACEHOLDER — replace .logo-mini with <img src="assets/logo-mini.png" style="width:36px;height:36px;object-fit:contain;"> */
    .logo-mini { width: 36px; height: 36px; background: rgba(255,255,255,.15); border: 1.5px dashed rgba(255,255,255,.5); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-mini span { font-size: 9px; color: rgba(255,255,255,.6); text-align: center; line-height: 1.2; }
    .brand-label { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: #fff; letter-spacing: .02em; } /* CUSTOM FONT ↓ */
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; color: rgba(255,255,255,.85); font-family: var(--font-body); font-size: 14px; font-weight: 500; text-decoration: none; transition: background .15s; }
    .nav-item:hover { background: rgba(255,255,255,.15); }
    .nav-item.active { background: rgba(255,255,255,.22); color: #fff; font-weight: 600; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar-footer { padding: 12px 12px 24px; }
    .logout-btn { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; color: rgba(255,255,255,.8); font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: none; width: 100%; transition: background .15s; }
    .logout-btn:hover { background: rgba(255,255,255,.15); }
    .logout-btn svg { width: 18px; height: 18px; }
    .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 22px 36px 18px; border-bottom: 1.5px solid var(--border); background: var(--cream); }
    .page-title { font-family: var(--font-display); font-size: 32px; font-weight: 700; color: var(--maroon); } /* CUSTOM FONT ↓ */
    .search-box { display: flex; align-items: center; gap: 8px; background: var(--cream); border: 1.5px solid var(--border); border-radius: 50px; padding: 9px 16px; width: 240px; }
    .search-box svg { width: 16px; height: 16px; color: var(--text-muted); flex-shrink: 0; }
    .search-box input { border: none; background: transparent; outline: none; font-family: var(--font-body); font-size: 14px; color: var(--text-dark); width: 100%; }
    .search-box input::placeholder { color: var(--text-muted); }
    .content { padding: 28px 36px; }
    .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .seminar-card { background: var(--cream); border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 3px 5px 0px var(--card-shadow); display: flex; flex-direction: column; }
    .card-img-placeholder { background: var(--cream); border: 1.5px dashed var(--border); border-radius: 10px; margin: 10px 10px 0; height: 110px; flex-shrink: 0; }
    .card-tags { display: flex; gap: 6px; padding: 10px 10px 0; }
    .tag { background: var(--maroon); color: #fdf8e1; font-family: var(--font-body); font-size: 11px; border-radius: 6px; padding: 5px 10px; }
    .card-title { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--maroon); padding: 10px 10px 6px; line-height: 1.35; flex: 1; } /* CUSTOM FONT ↓ */
    .card-meta { display: flex; align-items: center; justify-content: space-between; padding: 0 10px 12px; }
    .org-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--maroon); }
    .org-dot { width: 11px; height: 11px; border-radius: 50%; background: #c0392b; flex-shrink: 0; }
    .view-btn { display: flex; align-items: center; gap: 4px; background: var(--maroon); color: #fdf8e1; border: none; border-radius: 50px; padding: 6px 12px; font-family: var(--font-body); font-size: 12px; cursor: pointer; text-decoration: none; transition: background .15s; }
    .view-btn:hover { background: var(--maroon-dark); }
      .brand-logo { display: block; object-fit: contain; background: transparent !important; border: 0 !important; border-radius: 0 !important; }
    .sidebar-brand .brand-logo { width: 36px; height: 36px; flex-shrink: 0; }
    .right-panel .brand-logo { width: 160px; height: 160px; margin-bottom: 24px; }
    .logo-mark-img { width: 50px; height: 50px; flex: 0 0 auto; }
    .empty-state {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
    }
  </style>
  <link rel="stylesheet" href="../shared/css/attendee-portal.min.css">
  <link rel="stylesheet" href="../shared/css/animations.css">
  <link rel="stylesheet" href="../shared/css/responsive.css">
</head>
<body class="attendee-portal">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img class="logo-mini brand-logo" src="../assets/svg/seminex-logo-white.svg" alt="Seminex logo">
      <span class="brand-label">Seminex</span>
    </div>
    <nav class="sidebar-nav">
      <a href="home.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>Home</a>
      <a href="your-seminar.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Your Seminars</a>
      <a href="available-seminar.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Available Seminars</a>
      <a href="history.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 0 .5-4.5"/><polyline points="3 3 3 8 8 8"/></svg>History</a>
      <a href="profile.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="window.location.href='signin.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1 class="page-title">Available Seminar</h1>
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        <input type="text" placeholder="Search seminar" />
      </div>
    </div>
    <div class="content">
      <div class="card-grid" id="seminarGrid"></div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;color:#d4c9a0;margin-bottom:12px;">
          <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        <p style="font-family:var(--font-display);font-size:18px;font-weight:700;color:#b0a080;margin-bottom:6px;">No seminars available</p>
        <p style="font-size:13px;color:#b0a080;">Check back later — new seminars will appear here.</p>
      </div>
    </div>
  </main>

  <script>
    /*
     * AVAILABLE SEMINARS — render hook
     * ─────────────────────────────────────────────────────────
     * Replace the empty `availableSeminars` array below with
     * real data from your backend when ready.
     *
     * Each seminar object shape:
     * {
     *   id:    string   — unique seminar ID
     *   title: string   — seminar title
     *   date:  string   — display date  e.g. "Jan 15, 2025"
     *   time:  string   — display time  e.g. "9:00 AM"
     *   place: string   — venue
     *   org:   string   — organization name
     *   img:   string   — banner URL (optional)
     * }
     */
    const availableSeminars = [];  // ← inject data here

    const grid  = document.getElementById('seminarGrid');
    const empty = document.getElementById('emptyState');
    const searchInput = document.querySelector('.search-box input');

    function buildCard(s) {
      const imgHtml = s.img
        ? `<img src="${s.img}" alt="${s.title}" style="width:100%;height:110px;object-fit:cover;border-radius:10px;margin:10px 10px 0;display:block;">`
        : `<div class="card-img-placeholder"></div>`;
      return `
        <div class="seminar-card" data-title="${s.title.toLowerCase()}" data-org="${s.org.toLowerCase()}">
          ${imgHtml}
          <div class="card-tags">
            <span class="tag">${s.date}</span>
            <span class="tag">${s.time}</span>
            <span class="tag">${s.place}</span>
          </div>
          <div class="card-title">${s.title}</div>
          <div class="card-meta">
            <div class="org-row"><span class="org-dot"></span><span>${s.org}</span></div>
            <a href="available-seminar-detail.html?id=${encodeURIComponent(s.id)}" class="view-btn">View ›</a>
          </div>
        </div>`;
    }

    function renderCards(data) {
      grid.innerHTML = data.map(buildCard).join('');
      empty.style.display = data.length === 0 ? 'flex' : 'none';
      grid.style.display  = data.length === 0 ? 'none'  : 'grid';
    }

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = availableSeminars.filter(s =>
        s.title.toLowerCase().includes(q) || s.org.toLowerCase().includes(q)
      );
      renderCards(filtered);
    });

    renderCards(availableSeminars);
  </script>
</body>
</html>
